services:
  preprocess:
    image: ziglings/ziglang:latest
    container_name: preprocess
    working_dir: /workspace
    command: ['/workspace/fraud-api/scripts/preprocess-container.sh']
    volumes:
      - ./:/workspace

  api-1: &api
    container_name: api-1
    image: fraud-api-go:local
    working_dir: /app
    volumes:
      - ./:/workspace
      - ./fraud-api/vector-index:/data/vector-index:rw
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    depends_on:
      preprocess:
        condition: service_completed_successfully
    environment:
      - INSTANCE_ID=1
      - API_WORKERS=8
    command:
      - /app/main
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '512MB'

  api-2:
    <<: *api
    container_name: api-2
    environment:
      - INSTANCE_ID=2

  lb-zig:
    image: ziglings/ziglang:latest
    container_name: lb-zig
    working_dir: /workspace
    command:
      - sh
      - -lc
      - exec /workspace/lb-zig/main
    ports:
      - '9999:9999'
    depends_on:
      - api-1
      - api-2
    volumes:
      - ./:/workspace
      - rinha-sockets:/tmp/rinha
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '128MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
