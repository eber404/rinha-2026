services:
  fraud-api-1: &fraud-api
    container_name: fraud-api-1
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    volumes:
      - ./fraud-api/vector-index:/app/vector-index:rw
      - ./fraud-api/tests:/app/tests:ro
      - rinha-sockets:/tmp/rinha
      - zig-cache:/tmp/zig-cache
      - ./fraud-api/main_arm64:/app/main
    networks:
      - rinha-net
    restart: on-failure
    environment:
      - INSTANCE_ID=1
      - ZIG_GLOBAL_CACHE_DIR=/tmp/zig-cache
      - ZIG_CACHE_DIR=/tmp/zig-cache

  fraud-api-2:
    <<: *fraud-api
    container_name: fraud-api-2
    environment:
      - INSTANCE_ID=2

  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    container_name: load-balancer
    ports:
      - '9999:9999'
    volumes:
      - ./load-balancer/tests:/app/tests:ro
      - rinha-sockets:/tmp/rinha
      - zig-cache:/tmp/zig-cache
      - ./load-balancer/main_arm64:/app/main
    environment:
      - ZIG_GLOBAL_CACHE_DIR=/tmp/zig-cache
      - ZIG_CACHE_DIR=/tmp/zig-cache

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
  zig-cache:
