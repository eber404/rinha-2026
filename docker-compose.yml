services:
  fraud-api-1:
    &fraud-api
    container_name: fraud-api-1
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    volumes:
      - ./fraud-api/src:/app/src
      - ./fraud-api/vector-index:/app/vector-index:ro
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '157MB'

  fraud-api-2:
    <<: *fraud-api
    container_name: fraud-api-2
    environment:
      - INSTANCE_ID=2
      - UDS_PATH=/tmp/rinha/api-2.sock
      - DATA_DIR=/app/vector-index

  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    container_name: load-balancer
    ports:
      - "9999:9999"
    volumes:
      - ./load-balancer/src:/app/src
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    depends_on:
      - fraud-api-1
      - fraud-api-2
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '35MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets: