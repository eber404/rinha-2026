services:
  fraud-api-1: &fraud-api
    container_name: fraud-api-1
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    volumes:
      - ./fraud-api/vector-index:/app/vector-index:rw
      - ./fraud-api/tests:/app/tests:ro
      - rinha-sockets:/tmp/rinha
      - zig-cache:/tmp/zig-cache
      - ./fraud-api/main_arm64:/app/main
    networks:
      - rinha-net
    restart: on-failure
    environment:
      - INSTANCE_ID=1
      - ZIG_GLOBAL_CACHE_DIR=/tmp/zig-cache
      - ZIG_CACHE_DIR=/tmp/zig-cache
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: '160MB'

  fraud-api-2:
    <<: *fraud-api
    container_name: fraud-api-2
    environment:
      - INSTANCE_ID=2

  haproxy:
    image: haproxy:lts-alpine
    container_name: haproxy
    user: "0:0"
    ports:
      - '9999:9999'
    depends_on:
      - fraud-api-1
      - fraud-api-2
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - rinha-sockets:/tmp/rinha
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '30MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
  zig-cache:
