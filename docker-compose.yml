services:
  preprocess:
    image: gcc:13-bookworm
    container_name: preprocess
    working_dir: /workspace
    command: ["/workspace/scripts/preprocess.sh"]
    volumes:
      - ./:/workspace

  api-1: &api
    image: oven/bun:canary
    container_name: api-1
    working_dir: /app
    command: ["bun", "run", "--watch", "src/index.ts"]
    volumes:
      - ./fraud-api:/app
      - ./vector-index:/data:ro
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    depends_on:
      preprocess:
        condition: service_completed_successfully
    environment:
      - INSTANCE_ID=1
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: '128MB'

  api-2:
    <<: *api
    container_name: api-2
    environment:
      - INSTANCE_ID=2

  lb:
    build:
      context: load-balancer
    container_name: lb
    ports:
      - '9999:9999'
    volumes:
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: '64MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
