services:
  preprocess:
    image: ziglings/ziglang:latest
    container_name: preprocess
    working_dir: /workspace
    command: ["/workspace/fraud-api/scripts/preprocess-container.sh"]
    volumes:
      - ./:/workspace

  api-1: &api
    container_name: api-1
    build:
      context: .
      dockerfile: fraud-api/Dockerfile
    volumes:
      - ./fraud-api/vector-index:/data/vector-index:rw
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    depends_on:
      preprocess:
        condition: service_completed_successfully
    environment:
      - INSTANCE_ID=1
    deploy:
      resources:
        limits:
          cpus: '0.55'
          memory: '143MB'

  api-2:
    <<: *api
    container_name: api-2
    environment:
      - INSTANCE_ID=2

  lb-zig:
    build:
      context: .
      dockerfile: lb-zig/Dockerfile
    container_name: lb-zig
    ports:
      - '9999:9999'
    depends_on:
      - api-1
      - api-2
    volumes:
      - rinha-sockets:/tmp/rinha
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: '64MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
