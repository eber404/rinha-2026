services:
  server-1: &server
    container_name: server-1
    build:
      context: .
      dockerfile: server/Dockerfile
    volumes:
      - ./fraud-engine/vector-index:/app/fraud-engine/vector-index:rw
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    environment:
      - INSTANCE_ID=1
      - MOCK_MODE=${MOCK_MODE:-}
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: '143MB'

  server-2:
    <<: *server
    container_name: server-2
    environment:
      - INSTANCE_ID=2
      - MOCK_MODE=${MOCK_MODE:-}

  haproxy:
    build:
      context: .
      dockerfile: lb-zig-uring/Dockerfile
    container_name: haproxy
    ports:
      - '9999:9999'
    depends_on:
      - server-1
      - server-2
    environment:
      - LB_PORT=9999
      - LB_BACKEND_1=/tmp/rinha/api-1.sock
      - LB_BACKEND_2=/tmp/rinha/api-2.sock
      - LB_RING_ENTRIES=4096
    volumes:
      - rinha-sockets:/tmp/rinha
    deploy:
      resources:
        limits:
          cpus: '1.20'
          memory: '64MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
