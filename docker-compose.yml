services:
  preprocess:
    image: gcc:13-bookworm
    container_name: preprocess
    working_dir: /workspace
    command: ["/workspace/scripts/preprocess.sh"]
    volumes:
      - ./:/workspace

  api-1: &api
    image: fraud-api:local
    build:
      context: fraud-api
      network: host
    container_name: api-1
    working_dir: /app
    command: ["bun", "run", "src/index.ts"]
    volumes:
      - ./fraud-api:/app
      - ./vector-index:/data/vector-index:ro
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    depends_on:
      preprocess:
        condition: service_completed_successfully
    environment:
      - INSTANCE_ID=1
      - FRAUD_DATASET_PATH=/data/vector-index
    deploy:
      resources:
        limits:
          cpus: '0.38'
          memory: '128MB'

  api-2:
    <<: *api
    container_name: api-2
    environment:
      - INSTANCE_ID=2
      - FRAUD_DATASET_PATH=/data/vector-index

  lb:
    image: rinha-2026-lb
    build:
      context: load-balancer
      network: host
    container_name: lb
    ports:
      - '9999:9999'
    volumes:
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: '0.09'
          memory: '128MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
