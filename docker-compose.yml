services:
  server-1: &server
    container_name: server-1
    build:
      context: .
      dockerfile: server/Dockerfile
    volumes:
      - ./fraud-engine/vector-index:/app/fraud-engine/vector-index:rw
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    environment:
      - INSTANCE_ID=1
      - MOCK_MODE=${MOCK_MODE:-}
    deploy:
      resources:
        limits:
          cpus: '0.55'
          memory: '143MB'

  server-2:
    <<: *server
    container_name: server-2
    environment:
      - INSTANCE_ID=2
      - MOCK_MODE=${MOCK_MODE:-}

  # haproxy:
  #   build:
  #     context: .
  #     dockerfile: lb-c/Dockerfile
  #   container_name: haproxy
  #   ports:
  #     - '9999:9999'
  #   depends_on:
  #     - server-1
  #     - server-2
  #   environment:
  #     - LB_WORKERS=1
  #   volumes:
  #     - rinha-sockets:/tmp/rinha
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.40'
  #         memory: '64MB'

  lb-zig-uring:
    build:
      context: .
      dockerfile: lb-zig-uring/Dockerfile
    container_name: lb-zig-uring
    ports:
      - '9999:9999'
    depends_on:
      - server-1
      - server-2
    volumes:
      - rinha-sockets:/tmp/rinha
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: '64MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
