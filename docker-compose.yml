services:
  fraud-api-1: &fraud-api
    container_name: fraud-api-1
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    volumes:
      - ./vector-index:/app/vector-index:rw
      - ./tests:/app/tests:ro
      - rinha-sockets:/tmp/rinha
    networks:
      - rinha-net
    restart: on-failure
    environment:
      - INSTANCE_ID=1
      - ZIG_GLOBAL_CACHE_DIR=/tmp/zig-cache
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '157MB'

  fraud-api-2:
    <<: *fraud-api
    container_name: fraud-api-2
    environment:
      - INSTANCE_ID=2

  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    container_name: load-balancer
    ports:
      - '9999:9999'
    volumes:
      - ./tests:/app/tests:ro
      - rinha-sockets:/tmp/rinha
    environment:
      - ZIG_GLOBAL_CACHE_DIR=/tmp/zig-cache
    networks:
      - rinha-net
    restart: always
    depends_on:
      - fraud-api-1
      - fraud-api-2
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '35MB'

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
