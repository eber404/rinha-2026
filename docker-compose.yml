services:
  fraud-api-1:
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    image: fraud-api:latest
    container_name: fraud-api-1
    environment:
      - INSTANCE_ID=1
      - PORT=8080
      - DATA_DIR=/app/data
    volumes:
      - ./fraud-api/data:/app/data
    networks:
      - rinha-net
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512MB'

  fraud-api-2:
    build:
      context: ./fraud-api
      dockerfile: Dockerfile
    image: fraud-api:latest
    container_name: fraud-api-2
    environment:
      - INSTANCE_ID=2
      - PORT=8080
      - DATA_DIR=/app/data
    volumes:
      - ./fraud-api/data:/app/data
    networks:
      - rinha-net
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512MB'

  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    image: rinha-lb:latest
    container_name: load-balancer
    ports:
      - "9999:9999"
    networks:
      - rinha-net
    restart: on-failure
    depends_on:
      - fraud-api-1
      - fraud-api-2
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '128MB'

networks:
  rinha-net:
    driver: bridge